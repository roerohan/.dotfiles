schemaVersion: "1"
kind: mixin
name: opencode-config
displayName: OpenCode User Config
description: Injects user-level OpenCode configuration into the sandbox

environment:
  variables:
    PLANNOTATOR_REMOTE: "1"

commands:
  install:
    - command: >-
        cd /home/agent/.config/opencode && npm install
      user: "1000"
      description: Install OpenCode plugin dependencies
    - command: >-
        (command -v gh >/dev/null 2>&1) || (apt-get update -qq && apt-get install -y -qq gh)
      user: "0"
      description: Install GitHub CLI
  startup:
    - command: ["sh", "-c", "KEY=$(ssh-add -L 2>/dev/null | head -n 1) && [ -n \"$KEY\" ] && git config --global gpg.format ssh && git config --global user.signingkey \"key::$KEY\" && git config --global commit.gpgsign true || true"]
      user: "1000"
      description: Configure SSH commit signing from forwarded key
