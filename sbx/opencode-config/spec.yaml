schemaVersion: "1"
kind: mixin
name: opencode-config
displayName: OpenCode User Config
description: Injects user-level OpenCode configuration into the sandbox

environment:
  variables:
    PLANNOTATOR_REMOTE: "1"
    # NODE_EXTRA_CA_CERTS appends to Node's built-in CAs (does not replace).
    # When the file is absent Node prints a warning and falls back to built-in CAs.
    NODE_EXTRA_CA_CERTS: /home/agent/.ssl/corp-ca-bundle.pem

commands:
  install:
    - command: |-
        if [ -s /home/agent/.ssl/corp-ca-bundle.pem ]; then
          cp /home/agent/.ssl/corp-ca-bundle.pem /usr/local/share/ca-certificates/corp-ca-bundle.crt &&
          update-ca-certificates
        else
          echo "No corporate CA certs — skipping OS trust store install"
        fi
      user: "0"
      description: Install corporate CA certificates into OS trust store (skipped if absent)
    - command: >-
        apt-get update -qq && apt-get install -y -qq
        git
        gh
        tmux
        python3
        python3-pip
        python3-venv
        pipx
        curl
        jq
        ripgrep
        fd-find
        less
        build-essential
      user: "0"
      description: Install common development tools
    - command: >-
        command -v corepack >/dev/null 2>&1 && corepack enable || true
      user: "0"
      description: Enable Corepack when available
    - command: |-
        export NVM_DIR="/home/agent/.nvm"
        if [ ! -s "$NVM_DIR/nvm.sh" ]; then
          mkdir -p "$NVM_DIR"
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | PROFILE=/home/agent/.bashrc bash
        fi
        grep -q 'NVM_DIR="/home/agent/.nvm"' /home/agent/.profile 2>/dev/null || cat >> /home/agent/.profile <<'EOF'
        export NVM_DIR="/home/agent/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        EOF
      user: "1000"
      description: Install nvm for switching Node versions
    - command: >-
        command -v pnpm >/dev/null 2>&1 || npm install -g pnpm
      user: "0"
      description: Install pnpm package manager
    - command: >-
        command -v uv >/dev/null 2>&1 || pipx install uv
      user: "1000"
      description: Install uv Python package manager
    - command: >-
        cd /home/agent/.config/opencode && npm install
      user: "1000"
      description: Install OpenCode plugin dependencies
